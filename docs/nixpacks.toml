# Nixpacks configuration for Railway
[phases.setup]
nixPkgs = ["nodejs_20", "pnpm"]

[phases.install]
cmds = [
  "pnpm config set auto-install-peers true",
  "pnpm install --frozen-lockfile --prod=false"
]

[phases.build]
cmds = [
  "cp next.config.railway.ts next.config.ts",
  "pnpm build"
]

[start]
cmd = "pnpm start"

[variables]
NODE_ENV = "production"
