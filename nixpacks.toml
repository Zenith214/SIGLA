# Nixpacks configuration for Railway deployment
providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20", "pnpm"]
aptPkgs = ["libatomic1"]

[phases.install]
cmds = [
  "pnpm config set auto-install-peers true",
  "pnpm install --no-frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm prisma generate",
  "pnpm build"
]

[start]
cmd = "pnpm start"
