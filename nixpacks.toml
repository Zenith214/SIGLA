# Nixpacks configuration for Railway deployment
[phases.setup]
nixPkgs = ["nodejs_20", "pnpm"]
aptPkgs = ["libatomic1"]

# Force Node.js provider (prevent Python detection from ml/ folder)
[providers]
node = true

[phases.install]
cmds = [
  "pnpm config set auto-install-peers true",
  "pnpm install --no-frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm prisma generate",
  "pnpm build"
]

[start]
cmd = "pnpm start"

[variables]
NODE_ENV = "production"
