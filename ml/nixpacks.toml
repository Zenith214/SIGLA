# Nixpacks configuration for ML service deployment
[phases.setup]
nixPkgs = ["python311Full", "postgresql"]
aptPkgs = ["gcc", "g++", "make", "libpq-dev"]

[phases.install]
cmds = [
  "python3 -m ensurepip --upgrade",
  "python3 -m pip install --upgrade pip setuptools wheel",
  "python3 -m pip install -r requirements.txt"
]

[start]
cmd = "python3 -m uvicorn app:app --host 0.0.0.0 --port $PORT"

[variables]
PYTHONUNBUFFERED = "1"
