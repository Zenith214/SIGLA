# Nixpacks configuration for ML service deployment
[phases.setup]
nixPkgs = ["python311", "postgresql"]
aptPkgs = ["gcc", "g++", "make", "libpq-dev"]

[phases.install]
cmds = [
  "python3 -m venv /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip setuptools wheel",
  ". /opt/venv/bin/activate && pip install -r requirements.txt"
]

[start]
cmd = ". /opt/venv/bin/activate && uvicorn app:app --host 0.0.0.0 --port $PORT"

[variables]
PYTHONUNBUFFERED = "1"
